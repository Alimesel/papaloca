<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Papaloca Restaurant</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Preload hero images -->
  <link rel="preload" as="image" href="assets/images/burgerimg1.webp" fetchpriority="high">

  <!-- DNS prefetch for Supabase -->
  <link rel="preconnect" href="https://imtxhzadwvvasaydrpou.supabase.co">
  <link rel="dns-prefetch" href="https://imtxhzadwvvasaydrpou.supabase.co">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    /* ══════════════════════════════════════════════════════
       PAPALOCA — PROFESSIONAL RESTAURANT SPLASH
       Palette mirrors navbar exactly:
         background  #ffffff
         red         #c0392b
         text-dark   #1a1008
         muted       #8a7060
    ══════════════════════════════════════════════════════ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    #app-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }

    #app-splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ── Top accent line ───────────────────────────────── */
    .splash-top-line {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: #c0392b;
    }

    /* ── Main centred card ─────────────────────────────── */
    .splash-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: splashCardIn 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes splashCardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo image ────────────────────────────────────── */
    .splash-logo-img {
      width: 68px;
      height: 68px;
      object-fit: contain;
      display: block;
      margin-bottom: 1.1rem;
    }

    /* ── Wordmark ──────────────────────────────────────── */
    .splash-name {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 1.85rem;
      font-weight: 700;
      color: #1a1008;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 0.35rem;
    }

    .splash-tagline {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: #c0392b;
      line-height: 1;
      margin-bottom: 1.6rem;
    }

    /* ── Fork & Spoon SVG divider ──────────────────────── */
    .splash-cutlery {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.6rem;
      color: #c0392b;
      opacity: 0.7;
    }

    .splash-cutlery svg {
      display: block;
    }

    .splash-cutlery-sep {
      width: 1px;
      height: 16px;
      background: #c0392b;
      opacity: 0.35;
      display: block;
    }

    /* ── Progress bar ──────────────────────────────────── */
    .splash-bar-wrap {
      width: 120px;
      height: 1.5px;
      background: rgba(192, 57, 43, 0.15);
      overflow: hidden;
      position: relative;
    }

    .splash-bar {
      position: absolute;
      left: 0; top: 0;
      height: 100%;
      width: 0;
      background: #c0392b;
      animation: splashFill 1.6s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards;
    }

    @keyframes splashFill {
      0%   { width: 0%;   opacity: 1; }
      85%  { width: 92%;  opacity: 1; }
      100% { width: 100%; opacity: 1; }
    }

    /* ── Loading label ─────────────────────────────────── */
    .splash-loading-text {
      margin-top: 0.85rem;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.5rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #8a7060;
      animation: splashDots 1.4s ease-in-out 0.5s infinite;
    }

    @keyframes splashDots {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1;   }
    }

    /* ── Corner accents ────────────────────────────────── */
    .splash-corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: rgba(192, 57, 43, 0.18);
      border-style: solid;
    }

    .splash-corner--tl {
      top: 1.4rem; left: 1.4rem;
      border-width: 1.5px 0 0 1.5px;
    }

    .splash-corner--tr {
      top: 1.4rem; right: 1.4rem;
      border-width: 1.5px 1.5px 0 0;
    }

    .splash-corner--bl {
      bottom: 1.4rem; left: 1.4rem;
      border-width: 0 0 1.5px 1.5px;
    }

    .splash-corner--br {
      bottom: 1.4rem; right: 1.4rem;
      border-width: 0 1.5px 1.5px 0;
    }
  </style>
</head>
<body>

  <!-- ══ SPLASH SCREEN — shown before Angular bootstraps ══ -->
  <div id="app-splash">

    <!-- Top red accent line -->
    <div class="splash-top-line"></div>

    <!-- Corner frame accents -->
    <div class="splash-corner splash-corner--tl"></div>
    <div class="splash-corner splash-corner--tr"></div>
    <div class="splash-corner splash-corner--bl"></div>
    <div class="splash-corner splash-corner--br"></div>

    <!-- Main content card -->
    <div class="splash-card">

      <!-- Logo -->
      <img
        src="assets/images/papalocalogo.webp"
        alt="Papaloca"
        class="splash-logo-img">

      <!-- Wordmark -->
      <span class="splash-name">Papaloca</span>
      <span class="splash-tagline">Restaurant</span>

      <!-- Fork & Spoon icon pair -->
      <div class="splash-cutlery" aria-hidden="true">

        <!-- Garfo (fork) -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 2v4c0 1.1.9 2 2 2h0a2 2 0 0 0 2-2V2"/>
          <path d="M10 8v14"/>
          <path d="M6 2v3"/>
          <path d="M14 2v3"/>
        </svg>

        <span class="splash-cutlery-sep"></span>

        <!-- Colher (spoon) -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a4 4 0 0 1 4 4c0 1.8-1.1 3.4-2.7 4.1L14 22h-4l.7-11.9A4.4 4.4 0 0 1 8 6a4 4 0 0 1 4-4z"/>
        </svg>

      </div>

      <!-- Loading bar -->
      <div class="splash-bar-wrap">
        <div class="splash-bar"></div>
      </div>

      <!-- Pulsing label -->
      <span class="splash-loading-text">A preparar</span>

    </div>
  </div>
  <!-- ══ END SPLASH ══ -->

  <app-root></app-root>

  <script>
    /* Called by AppComponent once Angular + data are ready */
    window.hideSplash = function () {
      var el = document.getElementById('app-splash');
      if (el) {
        el.classList.add('hidden');
        setTimeout(function () { el.remove(); }, 500);
      }
    };

    /* Safety fallback — hide after 6 s even if Angular stalls */
    setTimeout(function () {
      if (typeof window.hideSplash === 'function') window.hideSplash();
    }, 6000);
  </script>
</body>
</html>
